name: Docker Publish (manual)

# On-demand build + push of the multi-arch image to GHCR
# (ghcr.io/<owner>/<repo>) without cutting a release. Run it from the
# Actions tab ("Run workflow"), picking the branch and the tag to publish.
# release.yml still owns the canonical tag-time publish.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. latest, edge, v0.3.0-test)"
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
